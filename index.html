<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - AI Voice Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1f3a;
            --secondary: #ff6b35;
            --accent: #00d9ff;
            --success: #2ecc71;
            --text-primary: #ffffff;
            --text-secondary: #b0b8c1;
            --card-bg: #242d48;
            --input-bg: #1f2641;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #0f1419 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 3px;
        }

        .tagline {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
            background: rgba(31, 38, 65, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.ai .message-content {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--text-primary);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--secondary), #ff8c42);
            color: #ffffff;
            border-radius: 16px 16px 4px 16px;
        }

        .message-avatar {
            font-size: 20px;
            min-width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            opacity: 0.5;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .voice-controls {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: rgba(31, 38, 65, 0.4);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            align-items: center;
        }

        .mic-button {
            flex: 1;
            padding: 16px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .mic-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .mic-button:hover:not(:disabled) {
            color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .mic-button:hover:not(:disabled)::before {
            left: 0;
        }

        .mic-button.recording {
            background: #e74c3c;
            border-color: #e74c3c;
            color: white;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(231, 76, 60, 0);
            }
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-button {
            width: 48px;
            height: 48px;
            border: 2px solid var(--text-secondary);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-button:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 8px;
            font-size: 12px;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.3; }
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px;
                gap: 12px;
            }

            .logo {
                font-size: 24px;
            }

            .message-content {
                max-width: 85%;
                font-size: 13px;
            }

            .voice-controls {
                flex-direction: column;
            }

            .mic-button {
                width: 100%;
            }

            .action-buttons {
                width: 100%;
                gap: 6px;
            }

            .icon-button {
                flex: 1;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚔️ ATLAS</div>
            <div class="tagline">Advanced Titan Learning & Advisory System</div>
        </div>

        <div class="status">
            <span class="status-dot"></span>
            System Ready - Voice Input Active
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <div class="empty-state-icon">🎤</div>
                <div>
                    <div style="font-size: 16px; margin-bottom: 8px;">Welcome to ATLAS</div>
                    <div style="font-size: 12px;">Press the mic button and speak your question</div>
                </div>
            </div>
        </div>

        <div class="voice-controls">
            <button class="mic-button" id="micButton">
                <span id="micIcon">🎤</span>
                <span id="micText">Press to Record</span>
            </button>
            <div class="action-buttons">
                <button class="icon-button" id="clearButton" title="Clear chat">🗑️</button>
                <button class="icon-button" id="settingsButton" title="Settings">⚙️</button>
            </div>
        </div>
    </div>

    <script>
        class ATLAS {
            constructor() {
                this.isRecording = false;
                this.recognition = null;
                this.chatHistory = [];
                
                this.init();
                this.loadChatHistory();
            }

            init() {
                this.micButton = document.getElementById('micButton');
                this.clearButton = document.getElementById('clearButton');
                this.settingsButton = document.getElementById('settingsButton');
                this.chatContainer = document.getElementById('chatContainer');
                this.micIcon = document.getElementById('micIcon');
                this.micText = document.getElementById('micText');

                this.micButton.addEventListener('click', () => this.toggleRecording());
                this.clearButton.addEventListener('click', () => this.clearChat());
                this.settingsButton.addEventListener('click', () => this.openSettings());

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    this.recognition = new SpeechRecognition();
                    this.recognition.continuous = false;
                    this.recognition.interimResults = true;
                    this.recognition.lang = 'en-US';

                    this.recognition.onstart = () => this.updateMicButton(true);
                    this.recognition.onresult = (event) => {
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            if (event.results[i].isFinal) {
                                this.handleUserInput(event.results[i].transcript);
                            }
                        }
                    };
                    this.recognition.onend = () => this.updateMicButton(false);
                    this.recognition.onerror = (event) => {
                        console.error('Speech error:', event.error);
                        this.updateMicButton(false);
                    };
                }
            }

            toggleRecording() {
                if (!this.recognition) {
                    alert('Speech Recognition not supported');
                    return;
                }
                if (this.isRecording) {
                    this.recognition.stop();
                    this.isRecording = false;
                } else {
                    this.isRecording = true;
                    this.recognition.start();
                }
            }

            updateMicButton(recording) {
                if (recording) {
                    this.micButton.classList.add('recording');
                    this.micIcon.textContent = '🔴';
                    this.micText.textContent = 'Recording...';
                } else {
                    this.micButton.classList.remove('recording');
                    this.micIcon.textContent = '🎤';
                    this.micText.textContent = 'Press to Record';
                }
            }

            async handleUserInput(text) {
                if (!text.trim()) return;
                this.addMessage(text, 'user');
                this.showTyping();
                
                const response = await this.getResponse(text);
                this.removeTyping();
                this.addMessage(response, 'ai');
                this.speak(response);
            }

            async getResponse(text) {
                try {
                    // Try Hugging Face API (free)
                    const response = await fetch("https://api-inference.huggingface.co/models/gpt2", {
                        headers: {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 },
                        method: "POST",
                        body: JSON.stringify({ inputs: text, parameters: { max_length: 100 } }),
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        if (result[0]?.generated_text) {
                            let answer = result[0].generated_text.replace(text, '').trim();
                            return answer || this.getBasicResponse(text);
                        }
                    }
                } catch (e) {
                    console.log('API error, using basic response');
                }
                
                return this.getBasicResponse(text);
            }

            getBasicResponse(text) {
                const lower = text.toLowerCase();
                
                // Smart pattern matching
                if (lower.includes('hello') || lower.includes('hi')) return 'Hey there! What would you like to know?';
                if (lower.includes('time')) return `Current time: ${new Date().toLocaleTimeString()}`;
                if (lower.includes('what') && lower.includes('weather')) return 'I can\'t check weather, but you can use a weather app for that.';
                if (lower.includes('who') || lower.includes('what') || lower.includes('how')) return `That's a great question! ${text}. Can you give me more context?`;
                if (lower.includes('thank')) return 'You\'re welcome! Happy to help!';
                if (lower.includes('joke')) return 'Why did the AI go to school? To improve its learning model! 😄';
                if (lower.includes('help')) return 'I can answer questions about almost anything! Just ask me.';
                
                return `Interesting question about "${text}". Tell me more and I\'ll help you explore it!`;
            }

            addMessage(content, role) {
                const messageEl = document.createElement('div');
                messageEl.className = `message ${role}`;
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = role === 'user' ? '⚡' : '⚔️';

                const contentEl = document.createElement('div');
                contentEl.className = 'message-content';
                contentEl.textContent = content;

                if (role === 'user') {
                    messageEl.appendChild(contentEl);
                    messageEl.appendChild(avatar);
                } else {
                    messageEl.appendChild(avatar);
                    messageEl.appendChild(contentEl);
                }

                this.chatContainer.appendChild(messageEl);
                this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
                
                this.chatHistory.push({ role, content, timestamp: new Date() });
                this.saveChatHistory();
            }

            showTyping() {
                const typingEl = document.createElement('div');
                typingEl.className = 'message ai';
                typingEl.id = 'typingIndicator';
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = '⚔️';

                const typing = document.createElement('div');
                typing.className = 'typing-indicator';
                typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

                typingEl.appendChild(avatar);
                typingEl.appendChild(typing);
                this.chatContainer.appendChild(typingEl);
                this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
            }

            removeTyping() {
                const typingEl = document.getElementById('typingIndicator');
                if (typingEl) typingEl.remove();
            }

            speak(text) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }

            clearChat() {
                if (confirm('Clear all conversations?')) {
                    this.chatHistory = [];
                    this.chatContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🎤</div>
                            <div>
                                <div style="font-size: 16px; margin-bottom: 8px;">Welcome to ATLAS</div>
                                <div style="font-size: 12px;">Press the mic button and speak your question</div>
                            </div>
                        </div>
                    `;
                    this.saveChatHistory();
                }
            }

            openSettings() {
                alert('⚙️ Settings: Chat history is saved locally on your device.');
            }

            saveChatHistory() {
                localStorage.setItem('atlasChatHistory', JSON.stringify(this.chatHistory));
            }

            loadChatHistory() {
                const saved = localStorage.getItem('atlasChatHistory');
                if (saved) {
                    this.chatHistory = JSON.parse(saved);
                    if (this.chatHistory.length > 0) {
                        this.chatContainer.innerHTML = '';
                        this.chatHistory.forEach(msg => this.addMessage(msg.content, msg.role));
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => new ATLAS());
    </script>
</body>
</html>
